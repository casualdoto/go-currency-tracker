version: '3.8'

services:
  postgres-history:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: history_user
      POSTGRES_PASSWORD: history_password
      POSTGRES_DB: history_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_history_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U history_user -d history_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw-rates --replication-factor 1 --partitions 3 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic normalized-rates --replication-factor 1 --partitions 3 &&
        echo 'Topics created successfully'
      "

  data-collector:
    build: ./data-collector
    environment:
      CBR_BASE_URL: https://www.cbr-xml-daily.ru
      KAFKA_BROKERS: kafka:29092
      COLLECT_INTERVAL_CBR: 86400
      COLLECT_INTERVAL_CRYPTO: 60
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  normalization-service:
    build: ./normalization-service
    environment:
      KAFKA_BROKERS: kafka:29092
      CBR_BASE_URL: https://www.cbr-xml-daily.ru
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  history-service:
    build: ./history-service
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres-history
      DB_PORT: 5432
      DB_USER: history_user
      DB_PASSWORD: history_password
      DB_NAME: history_db
      DB_SSLMODE: disable
      CH_HOST: clickhouse
      CH_PORT: 9000
      CH_DATABASE: default
      CH_USER: default
      CH_PASSWORD: ""
      KAFKA_BROKERS: kafka:29092
      SERVER_PORT: 8084
      CBR_BASE_URL: https://www.cbr-xml-daily.ru
    depends_on:
      postgres-history:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  notification-service:
    build: ./notification-service
    env_file:
      - configs/.env
    ports:
      - "8085:8085"
    environment:
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:29092
      SERVER_PORT: 8085
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  telegram-bot:
    build: ./telegram-bot
    env_file:
      - configs/.env
    environment:
      API_GATEWAY_URL: http://api-gateway:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
    depends_on:
      - api-gateway
      - notification-service

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      HISTORY_SERVICE_URL: http://history-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      SERVER_PORT: 8080
    depends_on:
      - history-service
      - notification-service

  web-ui:
    build: ./web-ui
    ports:
      - "3000:3000"
    environment:
      API_GATEWAY_URL: http://api-gateway:8080
      SERVER_PORT: 3000
    depends_on:
      - api-gateway

volumes:
  postgres_history_data:
  clickhouse_data:
